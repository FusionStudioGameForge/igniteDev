<!DOCTYPE html>
<html lang="en">
<head>
    <!-- testing commit-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>igniteDev | Full Screen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #ui-container {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none; 
            z-index: 10;
        }

        #html-logo {
            margin-top: 10vh; 
            width: 450px;    
            height: auto;
            display: block;
        }

        /* Mobile block overlay */
        #mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            box-sizing: border-box;
        }

        #mobile-overlay img {
            width: min(260px, 70vw);
            height: auto;
            margin-bottom: 32px;
        }

        #mobile-overlay h1 {
            color: #0f0;
            font-family: sans-serif;
            font-size: clamp(20px, 5vw, 32px);
            margin: 0 0 16px;
        }

        #mobile-overlay p {
            color: #aaa;
            font-family: sans-serif;
            font-size: clamp(14px, 3.5vw, 18px);
            line-height: 1.6;
            max-width: 360px;
            margin: 0;
        }

        #mobile-overlay .icon {
            font-size: clamp(48px, 15vw, 80px);
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            #mobile-overlay { display: flex; }
            #ui-container, canvas { display: none !important; }
        }
    </style>
</head>
<body>
    <!-- Mobile block screen -->
    <div id="mobile-overlay">
        <img src="logo.png" alt="igniteDev logo">
        <div class="icon">🖥️</div>
        <h1>Desktop Only</h1>
        <p>This game is designed for keyboard and a larger screen.<br>Please open it on a laptop or PC to play.</p>
    </div>

    <div id="ui-container">
        <img id="html-logo" src="logo.png">
    </div>
    <script src="game.js"></script>
</body>
</html>
